# 本地测试/开发栈（HTTP）：上服务器前用它把「建任务→采集→匹配→评分→审核→定价→上架→监控」全流程验证一遍。
# 生产环境（域名 + HTTPS）请用 docker-compose.prod.yml，详见 docs/部署与访问说明.md。
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ozon
      POSTGRES_PASSWORD: ozon
      POSTGRES_DB: ozon
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ozon -d ozon"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build: ./server
    # db 有 healthcheck 门控，api 会等 Postgres 真正就绪后再启动，避免
    # alembic 早于 Postgres 接受连接而崩溃；restart 仍保留作为兜底自愈。
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://ozon:ozon@db:5432/ozon
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      FERNET_KEY: ${FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports: ["8000:8000"]
    # M6：改图产物落盘目录，与 worker 共享同一份宿主机目录，保证 sync=true（api 进程内跑）
    # 与 sync=false（worker 异步跑）两条改图路径写入的产物互相可见，容器重建也不丢。
    volumes: ["./server/static:/app/static"]
  worker:
    # INSTALL_ML 默认 false：mock demo 保持轻量、无需 torch/cn_clip 即可 docker compose up 跑通；
    # 真实 CLIP 去重需在 .env 中同时设置 INSTALL_ML=true（重装带 [ml] 的镜像）+ EMBEDDER=clip。
    build:
      context: ./server
      args:
        INSTALL_ML: "${INSTALL_ML:-false}"
    command: sh -c "arq app.workers.arq_worker.WorkerSettings"
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://ozon:ozon@db:5432/ozon
      REDIS_URL: redis://redis:6379/0
      FERNET_KEY: ${FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
      EMBEDDER: ${EMBEDDER:-mock}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes: ["./server/static:/app/static"]
  web:
    build: ./web
    ports: ["8080:80"]
    depends_on: [api]
volumes:
  pgdata:
