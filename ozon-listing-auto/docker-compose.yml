services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ozon
      POSTGRES_PASSWORD: ozon
      POSTGRES_DB: ozon
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ozon -d ozon"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build: ./server
    # db 有 healthcheck 门控，api 会等 Postgres 真正就绪后再启动，避免
    # alembic 早于 Postgres 接受连接而崩溃；restart 仍保留作为兜底自愈。
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://ozon:ozon@db:5432/ozon
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      FERNET_KEY: ${FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports: ["8000:8000"]
  worker:
    build: ./server
    command: sh -c "arq app.workers.arq_worker.WorkerSettings"
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://ozon:ozon@db:5432/ozon
      REDIS_URL: redis://redis:6379/0
      FERNET_KEY: ${FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
  web:
    build: ./web
    ports: ["8080:80"]
    depends_on: [api]
volumes:
  pgdata:
