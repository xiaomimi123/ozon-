services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ozon
      POSTGRES_PASSWORD: ozon
      POSTGRES_DB: ozon
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build: ./server
    # depends_on 只保证 db/redis 容器已启动，不保证其已就绪；首次启动时
    # alembic 可能早于 Postgres 接受连接而失败，故用 restart 让其自愈重连。
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://ozon:ozon@db:5432/ozon
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      FERNET_KEY: ${FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
    depends_on: [db, redis]
    ports: ["8000:8000"]
  worker:
    build: ./server
    command: sh -c "arq app.workers.arq_worker.WorkerSettings"
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://ozon:ozon@db:5432/ozon
      REDIS_URL: redis://redis:6379/0
      FERNET_KEY: ${FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
    depends_on: [db, redis]
  web:
    build: ./web
    ports: ["8080:80"]
    depends_on: [api]
volumes:
  pgdata:
